<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container" style="margin-top: 5rem;">
        <div class="row">
            <div class="col-12">
                <h1><i class="bi bi-people-fill"></i> Lista de Usuarios</h1>
                <div class="mb-3">
                    <a th:href="@{/users/new}" class="btn btn-primary">
                        <i class="bi bi-person-plus-fill"></i> Nuevo Usuario
                    </a>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th><i class="bi bi-hash"></i> ID</th>
                                <th><i class="bi bi-person"></i> Nombre</th>
                                <th><i class="bi bi-envelope"></i> Email</th>
                                <th><i class="bi bi-gear"></i> Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td><span class="badge bg-secondary" th:text="${user.id}">1</span></td>
                                <td th:text="${user.name}">Nombre</td>
                                <td th:text="${user.email}">email@example.com</td>
                                <td>
                                    <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-success me-2">
                                        <i class="bi bi-pencil-square"></i> Editar
                                    </a>
                                    <a th:href="@{/users/{id}/delete(id=${user.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás seguro de eliminar este usuario?')">
                                        <i class="bi bi-trash"></i> Eliminar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(users)}" class="text-center py-5">
                    <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
                    <p class="text-muted mt-3">No hay usuarios registrados</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
