<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
</head>
<body>
    <h1>Lista de Usuarios</h1>
    <a th:href="@{/users/new}">Nuevo Usuario</a>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.name}">Nombre</td>
                <td th:text="${user.email}">email@example.com</td>
                <td>
                    <a th:href="@{/users/{id}/edit(id=${user.id})}">Editar</a>
                    <a th:href="@{/users/{id}/delete(id=${user.id})}" onclick="return confirm('¿Eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
